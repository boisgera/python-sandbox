[workspace]
authors = ["Sébastien Boisgérault <Sebastien.Boisgerault@gmail.com>"]
channels = ["conda-forge"]
name = "python-sandbox"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
dev = "marimo edit"

[dependencies]
python = ">=3.14.4,<3.15"
ruff = ">=0.15.11,<0.16"

[pypi-dependencies]
marimo = ">=0.23.5, <0.24"
numpy = ">=2.4.4, <3"
matplotlib = ">=3.10.9, <4"
pillow = ">=12.2.0, <13"
plumbum = ">=1.10.0, <2"
beautifulsoup4 = ">=4.14.3, <5"
